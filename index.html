<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>우리의 결혼식에 초대합니다</title>

    <!-- Pretendard 폰트 -->
    <link rel="stylesheet" as="style" crossorigin
        href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <main class="invitation-container">
        <!-- 메인 커버 섹션 -->
        <section class="cover-section fade-in">
            <div class="cover-titles">
                <span class="date">2024. 10. 26</span>
                <h1 class="names">김지수 &amp; 이민호</h1>
                <p class="subtitle">우리, 결혼합니다</p>
            </div>
            <div class="cover-image-placeholder">
                <img src="images/KakaoTalk_20260317_171113044.jpg" alt="메인 웨딩 사진" />
            </div>
        </section>

        <!-- 모시는 글 섹션 -->
        <section class="greeting-section fade-in">
            <div class="section-title">
                <h3>초대합니다</h3>
                <span class="title-deco"></span>
            </div>
            <p>
                서로가 마주 보며 다져온 사랑을<br>
                이제 함께 한 곳을 바라보며 걸어가려 합니다.<br><br>
                저희 두 사람이 사랑의 이름으로<br>
                지켜나갈 수 있도록<br>
                앞날을 축복해 주시면 감사하겠습니다.
            </p>
        </section>

        <!-- 갤러리 섹션 - 2열 그리드 -->
        <section class="gallery-section fade-in">
            <div class="section-title">
                <h3>우리의 순간들</h3>
                <span class="title-deco"></span>
            </div>
            <div class="photo-grid" id="photo-grid">
                <img src="images/KakaoTalk_20260317_171113044_01.jpg" alt="갤러리 사진 1">
                <img src="images/KakaoTalk_20260317_171113044_02.jpg" alt="갤러리 사진 2">
                <img src="images/KakaoTalk_20260317_171113044_03.jpg" alt="갤러리 사진 3">
                <img src="images/KakaoTalk_20260317_171113044_04.jpg" alt="갤러리 사진 4">
                <img src="images/KakaoTalk_20260317_171113044_05.jpg" alt="갤러리 사진 5">
                <img src="images/KakaoTalk_20260317_171113044_06.jpg" alt="갤러리 사진 6">
                <img src="images/KakaoTalk_20260317_171113044_07.jpg" alt="갤러리 사진 7">
                <img src="images/KakaoTalk_20260317_171113044_08.jpg" alt="갤러리 사진 8">
                <img src="images/KakaoTalk_20260317_171113044_09.jpg" alt="갤러리 사진 9">
                <img src="images/KakaoTalk_20260317_171113044_10.jpg" alt="갤러리 사진 10">
            </div>
        </section>

        <!-- 마음 전하실 곳 (계좌번호) 섹션 -->
        <section class="account-section fade-in">
            <div class="section-title">
                <h3>마음 전하실 곳</h3>
                <span class="title-deco"></span>
            </div>
            <div class="account-box">
                <div class="account-info">
                    <span class="bank">신한은행</span>
                    <span class="acc-num" id="groom-acc">110-123-456789</span>
                    <span class="name">이민호</span>
                </div>
                <button class="copy-btn" data-clipboard-target="#groom-acc">복사하기</button>
            </div>
            <div class="account-box">
                <div class="account-info">
                    <span class="bank">국민은행</span>
                    <span class="acc-num" id="bride-acc">04-1234-5678</span>
                    <span class="name">김지수</span>
                </div>
                <button class="copy-btn" data-clipboard-target="#bride-acc">복사하기</button>
            </div>
        </section>

        <!-- 방명록 섹션 -->
        <section class="guestbook-section fade-in">
            <div class="section-title">
                <h3>방명록</h3>
                <span class="title-deco"></span>
            </div>
            <div class="guestbook-form">
                <input type="text" id="gb-name" placeholder="이름" maxlength="20">
                <textarea id="gb-message" placeholder="축하 메시지를 남겨주세요 ♡" maxlength="200"></textarea>
                <button class="guestbook-submit" id="gb-submit">남기기</button>
            </div>
            <div class="guestbook-list" id="guestbook-list">
                <p class="guestbook-empty">첫 번째 축하 메시지를 남겨주세요 ♡</p>
            </div>
        </section>

        <!-- 공유 섹션 -->
        <section class="share-section fade-in">
            <button class="share-btn kakao-share" id="kakao-share-btn">
                <img src="https://developers.kakao.com/assets/img/about/logos/kakaotalksharing/kakaotalk_sharing_btn_small.png"
                    alt="카카오톡 공유" />
                카카오톡 공유하기
            </button>
            <button class="share-btn link-copy" id="link-copy-btn">
                🔗 링크 복사하기
            </button>
        </section>

        <!-- 인터랙션 하트 버튼 -->
        <section class="interaction-btn-section fade-in">
            <button id="heart-btn" class="heart-btn">♥ 축하하기</button>
        </section>

        <!-- 사진 확대 모달 (라이트박스) -->
        <div id="image-modal" class="image-modal">
            <span class="close-modal">&times;</span>
            <div class="modal-inner">
                <button class="modal-nav prev" id="modal-prev">&#8249;</button>
                <img class="modal-content" id="expanded-img" alt="확대 사진">
                <button class="modal-nav next" id="modal-next">&#8250;</button>
            </div>
            <span class="modal-counter" id="modal-counter"></span>
        </div>

    </main>

    <!-- Kakao SDK -->
    <script src="https://t1.kakaocdn.net/kakao_js_sdk/2.7.2/kakao.min.js"
        integrity="sha384-TinbxGrZg3K/Kz8Ew9rLFX5E9lF51Q7TjN4V6E2E1x62oI3n5f0kG0u+G8cK8XmQ"
        crossorigin="anonymous"></script>

    <!-- Firebase SDK (방명록용) -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <script src="script.js"></script>
</body>

</html>
